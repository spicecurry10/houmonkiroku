<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訪問記録｜利用者一覧・日別・月別</title>
  <style>

    :root{
      --bg:#eef5f0;
      --bg2:#f8fbf7;
      --card:rgba(255,255,255,.94);
      --text:#16211b;
      --muted:#66756d;
      --line:#d9e8de;
      --green:#2f7d46;
      --green-dark:#1f5d34;
      --green-deep:#164628;
      --mint:#e9f7ee;
      --soft-green:#edf8f1;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --soft-blue:#eef6ff;
      --danger:#df4b5f;
      --danger-dark:#c83248;
      --danger-soft:#fff1f3;
      --warning:#f59e0b;
      --shadow:0 14px 32px rgba(28,76,47,.12);
      --shadow-soft:0 8px 22px rgba(28,76,47,.08);
      --radius:22px;
      --radius-sm:16px;
      --focus:0 0 0 4px rgba(47,125,70,.16);
    }

    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg)}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
      background:
        radial-gradient(circle at 18% -5%, rgba(124,199,142,.28), transparent 34%),
        radial-gradient(circle at 96% 18%, rgba(91,153,107,.18), transparent 28%),
        linear-gradient(180deg,#f7fbf8 0%,#eef5f0 42%,#f6f7f4 100%);
      color:var(--text);
      line-height:1.65;
      letter-spacing:.01em;
      -webkit-font-smoothing:antialiased;
    }

    .screen{display:none}
    .screen.active{display:block}

    header{
      background:
        linear-gradient(135deg,var(--green-deep) 0%,var(--green) 54%,#55a66a 100%);
      color:#fff;
      padding:18px 16px 20px;
      position:sticky;
      top:0;
      z-index:40;
      box-shadow:0 10px 26px rgba(22,70,40,.24);
      overflow:hidden;
    }
    header::before{
      content:"";
      position:absolute;
      inset:-70px -30px auto auto;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(255,255,255,.13);
      pointer-events:none;
    }
    header::after{
      content:"";
      position:absolute;
      left:-70px;
      bottom:-95px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      pointer-events:none;
    }
    .header-row,.title-row{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      max-width:980px;
      margin:0 auto;
    }
    .title-left{display:flex;align-items:center;gap:8px;min-width:0}
    h1{
      font-size:24px;
      margin:0;
      font-weight:900;
      letter-spacing:.04em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      text-shadow:0 1px 10px rgba(0,0,0,.12);
    }
    .sub-title{font-size:13px;opacity:.9;margin-top:3px}
    .header-tools{display:flex;gap:9px;align-items:center}

    button{
      appearance:none;
      border:none;
      border-radius:15px;
      padding:10px 15px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(180deg,var(--blue),var(--blue-dark));
      color:#fff;
      box-shadow:0 8px 18px rgba(37,99,235,.18);
      transition:transform .12s ease, filter .12s ease, box-shadow .12s ease, background .12s ease;
      touch-action:manipulation;
    }
    button:hover{filter:brightness(.98);transform:translateY(-1px)}
    button:active{transform:translateY(0);box-shadow:none}
    button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:none;box-shadow:var(--focus)}
    button.green{background:linear-gradient(180deg,#3d9a55,var(--green));box-shadow:0 8px 18px rgba(47,125,70,.20)}
    button.secondary{background:#fff;color:#1f2937;border:1px solid #dde7e1;box-shadow:0 8px 18px rgba(28,76,47,.08)}
    button.danger{background:linear-gradient(180deg,#f05c70,var(--danger));box-shadow:0 8px 18px rgba(223,75,95,.18)}
    button.outline{background:#fff;color:var(--green);border:2px solid var(--green);box-shadow:0 8px 18px rgba(28,76,47,.08)}
    .round-btn{
      width:54px;
      height:54px;
      border-radius:50%;
      font-size:34px;
      line-height:1;
      padding:0;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 8px 18px rgba(0,0,0,.08);
      backdrop-filter:blur(8px);
    }
    .small-header-btn{
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 8px 18px rgba(0,0,0,.08);
      color:#fff;
      padding:8px 12px;
      backdrop-filter:blur(8px);
    }
    .back-btn{
      background:transparent;
      color:#fff;
      box-shadow:none;
      font-size:40px;
      line-height:1;
      padding:0 8px 0 0;
    }
    .count-badge{
      background:rgba(255,255,255,.94);
      color:var(--green);
      font-weight:900;
      border-radius:15px;
      padding:8px 14px;
      font-size:20px;
      min-width:48px;
      text-align:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.4),0 6px 16px rgba(0,0,0,.10);
    }

    main{max-width:980px;margin:0 auto;padding:16px 12px 34px}
    .search-panel,.date-panel,.month-panel{
      background:rgba(255,255,255,.72);
      border-bottom:1px solid rgba(217,232,222,.9);
      padding:14px 16px;
      position:sticky;
      top:92px;
      z-index:35;
      box-shadow:0 10px 24px rgba(28,76,47,.08);
      backdrop-filter:blur(12px);
    }
    .search-box{
      max-width:980px;
      margin:0 auto;
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:18px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:9px 13px;
      box-shadow:var(--shadow-soft);
    }
    .search-icon{font-size:27px;opacity:.9}
    .search-box input{
      border:none;
      background:transparent;
      outline:none;
      font-size:20px;
      width:100%;
      min-height:42px;
      color:var(--text);
    }
    .search-box input::placeholder{color:#99a49e}
    .date-row,.month-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;max-width:980px;margin:0 auto 10px}
    .month-row{grid-template-columns:1fr auto}
    .date-row:last-child,.month-row:last-child{margin-bottom:0}
    .date-label{font-weight:900;color:#47564d;white-space:nowrap}
    input[type=date],input[type=month]{
      width:100%;
      min-height:56px;
      border:2px solid rgba(47,125,70,.85);
      border-radius:18px;
      padding:10px 14px;
      font-size:22px;
      text-align:center;
      color:var(--text);
      background:#fff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 6px 14px rgba(28,76,47,.08);
    }
    input,textarea,select{font-family:inherit}
    input::placeholder,textarea::placeholder{color:#9aa9a0}

    .toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:13px}
    .toolbar button{flex:0 1 auto}
    .summary-bar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      justify-content:space-between;
      background:linear-gradient(135deg,#eef7ff,#eefaf2);
      border:1px solid #cfebd8;
      color:#185b36;
      padding:13px 14px;
      border-radius:18px;
      margin-bottom:13px;
      font-weight:900;
      font-size:17px;
      box-shadow:var(--shadow-soft);
    }
    .status{color:var(--green);font-weight:900;min-height:24px;margin:4px 0 8px;font-size:14px}
    .empty-state{
      background:rgba(255,255,255,.9);
      border:1px dashed #bdd4c3;
      border-radius:22px;
      padding:30px 14px;
      text-align:center;
      color:#66756d;
      font-weight:800;
      box-shadow:var(--shadow-soft);
    }

    .user-toolbar{display:flex;gap:9px;margin-bottom:13px}
    .user-toolbar button{flex:1}
    .user-list{display:flex;flex-direction:column;gap:13px}
    .user-row{
      display:grid;
      grid-template-columns:58px 1fr 48px;
      gap:10px;
      align-items:center;
      background:var(--card);
      border-radius:22px;
      padding:12px;
      box-shadow:var(--shadow);
      border:1px solid rgba(217,232,222,.88);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .user-row:hover{transform:translateY(-1px);box-shadow:0 18px 38px rgba(28,76,47,.14)}
    .user-row{cursor:pointer;-webkit-tap-highlight-color:rgba(47,125,70,.10)}
    .user-initial{
      width:52px;
      height:52px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--green-deep),var(--green));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:26px;
      flex:0 0 auto;
      box-shadow:0 8px 16px rgba(47,125,70,.22);
    }
    .user-name-static{
      font-size:20px;
      font-weight:850;
      color:#111827;
      width:100%;
      min-width:0;
      padding:6px 0;
      line-height:1.25;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .user-name-input{
      border:none;
      background:transparent;
      font-size:20px;
      font-weight:850;
      color:#111827;
      width:100%;
      outline:none;
      min-width:0;
    }
    .trash-btn{
      box-shadow:none;
      background:#fff;
      color:#66756d;
      font-size:28px;
      padding:4px;
      border-radius:50%;
      border:1px solid #e3ece6;
    }
    .trash-btn{font-size:22px;color:#7b8a81}
    .trash-btn:hover{background:#f5faf7}
    .user-help,.footer-note{font-size:13px;color:#66756d;margin:12px 2px 0}

    .record-card,.month-card{
      background:var(--card);
      border:1px solid rgba(217,232,222,.92);
      border-radius:24px;
      margin-bottom:15px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .record-head{
      background:linear-gradient(135deg,#effaf2 0%,#f8fcf8 100%);
      border-bottom:1px solid var(--line);
      padding:13px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:end;
    }
    .record-title-input{
      font-size:19px;
      font-weight:900;
      border:1px solid #cfe4d4;
      border-radius:16px;
      padding:11px 13px;
      width:100%;
      background:rgba(255,255,255,.92);
      box-shadow:inset 0 1px 2px rgba(20,60,34,.04);
    }
    .record-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .record-actions button{padding:9px 12px}
    .section{padding:13px;border-bottom:1px solid #edf3ee}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .form-row{display:flex;flex-direction:column;gap:6px;min-width:0}
    .field-label,.row-title{font-size:13px;font-weight:900;color:#34483c}
    .form-row input[type=text],.form-row input[type=number],.form-row textarea,.mini-memo{
      width:100%;
      border:1px solid #cfded4;
      border-radius:16px;
      padding:10px 12px;
      font-size:16px;
      background:#fff;
      color:var(--text);
      box-shadow:inset 0 1px 2px rgba(20,60,34,.04);
    }
    .form-row textarea{min-height:82px;resize:vertical}
    .date-input-small{
      border:1px solid #cfded4!important;
      font-size:16px!important;
      min-height:44px!important;
      text-align:left!important;
      border-radius:16px!important;
      padding:8px 10px!important;
      box-shadow:none!important;
    }

    details{border-bottom:1px solid #edf3ee}
    summary{
      cursor:pointer;
      padding:14px 15px;
      font-size:17px;
      font-weight:900;
      color:var(--green-dark);
      background:linear-gradient(180deg,#ffffff,#f7fbf8);
      list-style:none;
      user-select:none;
    }
    summary::-webkit-details-marker{display:none}
    summary::before{content:"▼";display:inline-block;margin-right:8px;transform:rotate(-90deg);transition:.15s;color:#6faa7a}
    details[open] summary::before{transform:rotate(0)}
    .details-body{padding:13px;background:#fff}
    .group{
      background:linear-gradient(180deg,#fcfefd,#f8fbf8);
      border:1px solid #e2eee6;
      border-radius:18px;
      padding:11px;
    }
    .choice-line{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#fff;
      border:1px solid #cfded4;
      border-radius:999px;
      padding:8px 11px;
      font-size:14px;
      font-weight:850;
      box-shadow:0 3px 10px rgba(28,76,47,.05);
    }
    .pill input{accent-color:var(--green)}
    .mini-memo{margin-top:7px}
    .copy-area{position:absolute;left:-9999px;top:-9999px;opacity:0}
    .toggle-option{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);user-select:none;padding:8px 2px}

    .month-list-title{font-size:20px;font-weight:900;color:#56675c;margin:18px 2px 10px}
    .month-card{padding:17px 17px 15px}
    .month-date{font-size:24px;font-weight:900;color:var(--green);margin-bottom:12px}
    .vital-lines{font-size:20px;line-height:1.78;letter-spacing:.02em}
    .condition-line{border-top:1px solid #edf3ee;margin-top:12px;padding-top:12px;font-size:19px;line-height:1.75}
    .condition-line .label{font-weight:900;color:#3a4f42}
    .month-actions{border-top:1px solid #edf3ee;margin-top:12px;padding-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
    .month-actions button{font-size:16px;min-height:48px}
    .month-editor{margin-top:12px;border-top:1px dashed #cbded0;padding-top:12px}
    .hidden{display:none!important}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(14,30,21,.52);
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      backdrop-filter:blur(5px);
    }
    .modal-card{
      width:min(760px,100%);
      max-height:88vh;
      overflow:auto;
      background:rgba(255,255,255,.97);
      border-radius:28px;
      padding:22px 18px;
      box-shadow:0 22px 60px rgba(10,30,18,.30);
      border:1px solid rgba(255,255,255,.7);
    }
    .modal-title{text-align:center;font-size:25px;font-weight:900;margin:4px 0 22px;color:#111827;letter-spacing:.04em}
    .modal-section-label{display:flex;align-items:center;gap:8px;color:#66756d;font-weight:900;font-size:15px;margin:14px 0 10px}
    .backup-menu{display:flex;flex-direction:column;gap:11px}
    .backup-menu button{
      width:100%;
      min-height:68px;
      background:#fff;
      color:#111827;
      border:2px solid #e4ece7;
      box-shadow:0 8px 16px rgba(28,76,47,.06);
      border-radius:18px;
      text-align:left;
      font-size:20px;
      padding:16px 18px;
    }
    .backup-menu button:hover{background:#f8fbf8}
    .modal-divider{height:1px;background:#e4ece7;margin:16px 0}
    .modal-close{width:100%;min-height:56px;background:#fff!important;color:#66756d!important;border:2px solid #e4ece7!important;box-shadow:none!important;margin-top:14px;font-size:20px}
    .dict-editor{margin-top:12px;background:#f8fbf8;border:1px solid #e4ece7;border-radius:18px;padding:12px}
    .dict-editor textarea{width:100%;min-height:260px;border:1px solid #cfded4;border-radius:16px;padding:12px;font-size:16px;resize:vertical;background:#fff}
    .dict-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .modal-field{margin:0 0 16px;text-align:left}
    .modal-field label{display:block;color:#34483c;font-weight:900;margin-bottom:7px}
    .modal-field input{
      width:100%;
      min-height:58px;
      border:2px solid #cfded4;
      border-radius:18px;
      padding:12px 14px;
      font-size:20px;
      color:var(--text);
      background:#fff;
    }
    .file-input-hidden{display:none}


    .confirm-card{
      width:min(520px,100%);
      max-height:none;
      text-align:center;
    }
    .confirm-icon{
      width:64px;
      height:64px;
      border-radius:50%;
      margin:0 auto 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--danger-soft);
      color:var(--danger);
      font-size:34px;
      border:1px solid #ffd0d7;
    }
    .confirm-text{
      color:#34483c;
      font-size:16px;
      line-height:1.75;
      margin:0 0 18px;
      text-align:left;
      background:#f8fbf8;
      border:1px solid #e4ece7;
      border-radius:18px;
      padding:14px;
    }
    .confirm-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .confirm-actions button{
      min-height:54px;
      font-size:18px;
    }

    @media(max-width:700px){
      header{padding:20px 14px 12px}
      h1{font-size:21px}
      .sub-title{display:none}
      .header-row,.title-row{gap:8px}
      .header-tools{gap:6px}
      .small-header-btn{padding:6px 9px;border-radius:13px;font-size:14px}
      .round-btn{width:42px;height:42px;font-size:28px}
      .count-badge{min-width:42px;padding:6px 10px;border-radius:13px;font-size:18px}
      .search-panel,.date-panel,.month-panel{top:74px;padding:8px 14px}
      .search-box{border-radius:15px;padding:5px 10px;gap:8px}
      .search-icon{font-size:22px}
      .search-box input{font-size:17px;min-height:32px}
      .date-row{grid-template-columns:auto 1fr auto}
      .month-row{grid-template-columns:1fr auto}
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .grid-2{grid-template-columns:1fr}
      .record-head{grid-template-columns:1fr}
      .record-actions{justify-content:flex-start}
      .toolbar button{flex:1 1 auto}
      .user-row{grid-template-columns:52px 1fr 42px;padding:11px}
      .user-initial{width:46px;height:46px;font-size:23px}
      .user-name-static,.user-name-input{font-size:18px}
      .month-actions{grid-template-columns:1fr 1fr}
      .month-actions .copyBtn{grid-column:1 / 3}
      button{padding:10px 12px}
      input[type=date],input[type=month]{font-size:20px;min-height:52px}
      .backup-menu button{font-size:18px}
    }

  </style>
</head>
<body>
  <section id="userListScreen" class="screen active">
    <header>
      <div class="header-row">
        <h1>訪問記録</h1>
        <div class="header-tools">
          <button type="button" id="openBackupBtn" class="small-header-btn">⚙️</button>
          <span id="userCountBadge" class="count-badge">0</span>
        </div>
      </div>
    </header>
    <div class="search-panel">
      <div class="search-box"><span class="search-icon">🔍</span><input type="search" id="userSearch" placeholder="利用者を検索"></div>
    </div>
    <main>
      <div class="user-toolbar">
        <button type="button" id="addUserBtn" class="green">＋ 利用者を追加</button>
        <button type="button" id="goDailyBtn">日別実施一覧</button>
      </div>
      <div id="userList" class="user-list"></div>
    </main>
  </section>

  <section id="dailyScreen" class="screen">
    <header>
      <div class="title-row">
        <div class="title-left"><button type="button" id="backUserBtn" class="back-btn">‹</button><div><h1>日別実施一覧</h1><div class="sub-title">日付を選び、その日の実施者を編集します。</div></div></div>
        <button type="button" id="openBackupBtnDaily" class="small-header-btn">⚙️</button>
      </div>
    </header>
    <div class="date-panel">
      <div class="date-row"><div class="date-label">日付：</div><input type="date" id="selectedDate"><button type="button" id="todayBtn" class="green">今日</button></div>
    </div>
    <main>
      <div class="summary-bar"><span id="dailySummary">訪問：0件</span><span id="savedLabel">自動保存</span></div>
      <div class="toolbar">
        <button type="button" id="copyAllBtn" class="green">日別一括コピー</button>
        <label class="toggle-option"><input type="checkbox" id="omitEmpty" checked> 空欄はコピーしない</label>
      </div>
      <div id="status" class="status"></div>
      <div id="records"></div>
      <p class="footer-note">日別実施一覧ではバイタルと詳細項目を入力できます。一括コピーには基本動作・ADL・介入内容・特記事項も反映されます。</p>
    </main>
  </section>

  <section id="monthlyScreen" class="screen">
    <header>
      <div class="title-row">
        <div class="title-left"><button type="button" id="backUserFromMonthlyBtn" class="back-btn">‹</button><div><h1 id="monthlyUserTitle">利用者記録</h1><div class="sub-title">月別の記録一覧・報告書用出力</div></div></div>

<script>
const STORAGE_KEY="houmon_kiroku_form_v2_monthly";
const OLD_STORAGE_KEYS=["houmon_kiroku_form_v1"];
const SELECTED_DATE_KEY="houmon_kiroku_selected_date";
const SELECTED_MONTH_KEY="houmon_kiroku_selected_month";
const USER_STORAGE_KEY="houmon_user_list_v2";
const OLD_USER_STORAGE_KEYS=["houmon_user_list_v1"];
const DICT_STORAGE_KEY="houmon_my_dictionary_v1";

const careLevels=["自立","見守り","一部介助","全介助"];
const moveMethods=["独歩","杖","歩行器","歩行車","車椅子"];
const householdLevels=["実施あり","一部実施","困難","未実施"];
let records=[]; let users=[]; let currentUserId=""; let pendingDeleteUserId="";

const $=id=>document.getElementById(id);
const screens={user:$("userListScreen"),daily:$("dailyScreen"),monthly:$("monthlyScreen")};
const recordsEl=$("records"), monthlyRecordsEl=$("monthlyRecords"), userListEl=$("userList");
const statusEl=$("status"), monthlyStatusEl=$("monthlyStatus");
const selectedDateEl=$("selectedDate"), selectedMonthEl=$("selectedMonth"), omitEmptyEl=$("omitEmpty");

function uid(){return "r"+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function monthToday(){return today().slice(0,7)}
function formatDateJP(dateStr){if(!dateStr)return"";const [y,m,d]=dateStr.split("-");return `${Number(m)}月${Number(d)}日`}
function formatDateSlash(dateStr){if(!dateStr)return"";const [y,m,d]=dateStr.split("-");return `${Number(m)}/${Number(d)}`}
function escapeHTML(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function safeArr(v){return Array.isArray(v)?v:(v?[String(v)]:[])}
function userInitial(name){const s=String(name||"未").trim();return s?s.slice(0,1):"未"}
function getSelectedDate(){return selectedDateEl.value||today()}
function getSelectedMonth(){return selectedMonthEl.value||monthToday()}
function showStatus(msg,target=statusEl){target.textContent=msg;setTimeout(()=>{if(target.textContent===msg)target.textContent=""},2400)}
function markSaved(){const el=$("savedLabel"); if(!el)return; el.textContent="保存済み"; setTimeout(()=>el.textContent="自動保存",1500)}
function showScreen(name){Object.values(screens).forEach(s=>s.classList.remove("active")); screens[name].classList.add("active"); window.scrollTo({top:0,behavior:"smooth"})}

function defaultRecord(date=getSelectedDate(), user=null){return {__id:uid(),meta_date:date,meta_user_ref:user?.id||"",meta_user_id:user?.name||""}}
function makeUser(name=""){return {id:uid(),name}}
const userNameCollator=new Intl.Collator("ja-JP",{numeric:true,sensitivity:"base"});
function userSortName(user){return String(user?.name||"").trim()||"未設定"}
function sortUsers(){users.sort((a,b)=>userNameCollator.compare(userSortName(a),userSortName(b))||String(a.id||"").localeCompare(String(b.id||"")))}

function loadAll(){
  let raw=localStorage.getItem(STORAGE_KEY);
  if(!raw){for(const k of OLD_STORAGE_KEYS){raw=localStorage.getItem(k); if(raw)break}}
  try{records=raw?JSON.parse(raw):[]}catch(e){records=[]}
  if(!Array.isArray(records))records=[];
  records=records.map(r=>({...r,__id:r.__id||uid(),meta_date:r.meta_date||today(),meta_user_id:r.meta_user_id||"",meta_user_ref:r.meta_user_ref||""}));
  const d=localStorage.getItem(SELECTED_DATE_KEY)||today(); selectedDateEl.value=d;
  selectedMonthEl.value=localStorage.getItem(SELECTED_MONTH_KEY)||d.slice(0,7)||monthToday();
}
function saveAll(show=true){localStorage.setItem(STORAGE_KEY,JSON.stringify(records));localStorage.setItem(SELECTED_DATE_KEY,getSelectedDate());localStorage.setItem(SELECTED_MONTH_KEY,getSelectedMonth());if(show)markSaved()}
function loadUsers(){
  let raw=localStorage.getItem(USER_STORAGE_KEY);
  if(!raw){for(const k of OLD_USER_STORAGE_KEYS){raw=localStorage.getItem(k); if(raw)break}}
  try{users=raw?JSON.parse(raw):[]}catch(e){users=[]}
  if(!Array.isArray(users))users=[];
  users=users.map(u=>({id:u.id||uid(),name:u.name||""}));
  if(!users.length){
    const names=[...new Set(records.map(r=>String(r.meta_user_id||"").trim()).filter(Boolean))];
    users=names.map(name=>makeUser(name));
    records.forEach(r=>{const u=users.find(x=>x.name===r.meta_user_id); if(u)r.meta_user_ref=u.id});
  }
  saveUsers(false);
}
function saveUsers(render=true){sortUsers(); localStorage.setItem(USER_STORAGE_KEY,JSON.stringify(users)); if(render)renderUsers()}

function inputBlock(label,key,type="text",placeholder=""){
  const tag=type==="textarea"?`<textarea data-k="${key}" placeholder="${placeholder}"></textarea>`:`<input type="${type}" data-k="${key}" placeholder="${placeholder}">`;
  return `<div class="form-row"><label class="field-label">${label}</label>${tag}</div>`;
}
function radioGroup(title,key,options,memoKey=null,recordId=""){
  const radios=options.map(opt=>`<label class="pill"><input type="radio" data-k="${key}" name="${recordId}_${key}" value="${opt}"> ${opt}</label>`).join("");
  const memo=memoKey?`<input class="mini-memo" type="text" data-k="${memoKey}" placeholder="メモ">`:"";
  return `<div class="form-row group"><div class="row-title">${title}</div><div class="choice-line">${radios}</div>${memo}</div>`;
}
function checkGroup(title,key,options,memoKey=null){
  const checks=options.map(opt=>`<label class="pill"><input type="checkbox" data-k="${key}" value="${opt}"> ${opt}</label>`).join("");
  const memo=memoKey?`<input class="mini-memo" type="text" data-k="${memoKey}" placeholder="メモ">`:"";
  return `<div class="form-row group"><div class="row-title">${title}</div><div class="choice-line">${checks}</div>${memo}</div>`;
}
function interventionRow(title,key){
  return `<div class="form-row group"><div class="row-title">${title}</div><div class="choice-line"><label class="pill"><input type="checkbox" data-k="${key}_done" value="実施"> 実施</label></div><textarea data-k="${key}_memo" placeholder="内容・負荷量・反応など"></textarea></div>`;
}

function editorHTML(data, includeDate=false){
  const id=data.__id;
  return `
    <div class="section ${includeDate?"":"hidden"}"><div class="grid-2">${inputBlock("実施日","meta_date","date","")}</div></div>
    <div class="section"><div class="grid-4">
      ${inputBlock("SBP","vital_sbp","number","例：128")}${inputBlock("DBP","vital_dbp","number","例：72")}${inputBlock("SpO2","vital_spo2","number","例：97")}${inputBlock("PR","vital_pr","number","例：76")}
    </div></div>
    <details><summary>全体の様子</summary><div class="details-body grid-2">
      ${inputBlock("表情","overall_face","text","例：穏やか／眠そう")}${inputBlock("疲労感","overall_fatigue","text","例：軽度あり")}${inputBlock("疼痛の訴え","overall_pain_complaint","text","例：腰部痛あり")}${inputBlock("会話・発言","overall_speech","textarea","例：「今日は少し腰が重い」")}
    </div></details>
    <details><summary>身体機能</summary><div class="details-body grid-2">
      ${inputBlock("心肺機能","func_cardio","text")}${inputBlock("皮膚状態","func_skin","text")}${inputBlock("炎症所見","func_inflammation","text")}${inputBlock("疼痛：部位／程度／誘発動作","func_pain_detail","text")}${inputBlock("知覚","func_sensory","text")}${inputBlock("関節可動域","func_rom","text")}${inputBlock("筋力：MMT","func_mmt","text")}${inputBlock("筋緊張","func_tone","text")}${inputBlock("協調性","func_coordination","text")}${inputBlock("バランス","func_balance","text")}${inputBlock("足部・爪ケア","func_foot_nail","text")}
    </div></details>
    <details><summary>基本動作</summary><div class="details-body grid-2">
      ${radioGroup("起居","basic_bed_level",careLevels,"basic_bed_memo",id)}${radioGroup("起立","basic_stand_level",careLevels,"basic_stand_memo",id)}${radioGroup("移乗","basic_transfer_level",careLevels,"basic_transfer_memo",id)}${checkGroup("屋内移動","basic_indoor_methods",moveMethods,"basic_indoor_memo")}${checkGroup("屋外移動","basic_outdoor_methods",moveMethods,"basic_outdoor_memo")}${inputBlock("跛行","basic_limp","text","例：右立脚期短縮あり")}
    </div></details>
    <details><summary>日常生活動作 ADL</summary><div class="details-body grid-2">
      ${radioGroup("食事","adl_meal_level",careLevels,"adl_meal_memo",id)}${radioGroup("服薬","adl_medication_level",careLevels,"adl_medication_memo",id)}${radioGroup("整容","adl_grooming_level",careLevels,"adl_grooming_memo",id)}${radioGroup("トイレ","adl_toilet_level",careLevels,"adl_toilet_memo",id)}${radioGroup("排便・排尿コントロール","adl_excretion_level",careLevels,"adl_excretion_memo",id)}${radioGroup("入浴","adl_bathing_level",careLevels,"adl_bathing_memo",id)}${radioGroup("更衣","adl_dressing_level",careLevels,"adl_dressing_memo",id)}${radioGroup("階段昇降","adl_stairs_level",careLevels,"adl_stairs_memo",id)}${radioGroup("家事動作","adl_housework_level",householdLevels,"adl_housework_memo",id)}
    </div></details>
    <details><summary>介入内容</summary><div class="details-body grid-2">
      ${interventionRow("ROM訓練","int_rom")}${interventionRow("筋力訓練","int_strength")}${interventionRow("バランス練習","int_balance")}${interventionRow("歩行練習","int_gait")}${interventionRow("基本動作練習","int_basic")}${interventionRow("ADL練習","int_adl")}${interventionRow("自主訓練指導","int_self")}${interventionRow("環境調整","int_environment")}${interventionRow("家族指導","int_family")}
    </div></details>
    <details><summary>特記事項</summary><div class="details-body grid-2">
      ${inputBlock("転倒","special_fall","text")}${inputBlock("受診・服薬変更","special_medical_change","text")}${inputBlock("家族・ケアマネ連絡","special_contact","text")}${inputBlock("リスク・注意点","special_risk","text")}${inputBlock("次回方針","special_next_plan","text")}${inputBlock("その他","special_other","textarea")}
    </div></details>`;
}

function createDailyCard(data,index){
  const card=document.createElement("section"); card.className="record-card"; card.dataset.recordId=data.__id;
  card.innerHTML=`<div class="record-head"><div><label class="field-label">利用者ID・訪問順</label><input class="record-title-input" type="text" data-k="meta_user_id" placeholder="例：1件目 / ID001"></div><div class="record-actions"><button type="button" class="copyOneBtn green">コピー</button><button type="button" class="openMonthlyBtn secondary">月別</button><button type="button" class="duplicateBtn secondary">複製</button><button type="button" class="deleteBtn danger">削除</button></div></div>${editorHTML(data,false)}`;
  recordsEl.appendChild(card); populateCard(card,data); wireCard(card); return card;
}
function createMonthCard(data,index){
  const card=document.createElement("section");
  card.className="month-card";
  card.dataset.recordId=data.__id;
  card.innerHTML=`
    <div class="month-date">${escapeHTML(formatDateSlash(data.meta_date))}</div>
    <div class="month-actions"><button type="button" class="toggleEditBtn">編集</button><button type="button" class="deleteBtn danger">削除</button></div>
    <div class="month-editor hidden"><div class="record-card" style="box-shadow:none;margin:0;border-radius:14px;">${editorHTML(data,true)}</div></div>`;
  monthlyRecordsEl.appendChild(card);
  populateCard(card,data);
  wireCard(card);
  return card;
}
function conditionSummary(d){
  const parts=[];
  [d.overall_face,d.overall_fatigue,d.overall_pain_complaint,d.overall_speech,d.special_other].forEach(v=>{if(String(v||"").trim())parts.push(String(v).trim())});
  const interventions=[]; [[d.int_rom_done,"ROM"],[d.int_strength_done,"筋力"],[d.int_balance_done,"バランス"],[d.int_gait_done,"歩行"],[d.int_basic_done,"基本動作"],[d.int_adl_done,"ADL"],[d.int_self_done,"自主訓練"],[d.int_environment_done,"環境調整"],[d.int_family_done,"家族指導"]].forEach(([v,label])=>{if(v)interventions.push(label)});
  if(interventions.length)parts.push(`実施：${interventions.join("、")}`);
  return parts.join("。") || "";
}
function getRecordById(id){return records.find(r=>r.__id===id)}
function collectCardData(card){
  const id=card.dataset.recordId; const d=getRecordById(id); if(!d)return null;
  const groups={};
  card.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    if(el.type==="checkbox"){
      if(!groups[k])groups[k]=[];
      if(el.checked)groups[k].push(el.value||"実施");
    }else if(el.type==="radio"){
      if(el.checked)d[k]=el.value;
    }else{d[k]=el.value;}
  });
  Object.keys(groups).forEach(k=>{d[k]=groups[k].length===1 && groups[k][0]==="実施" ? "実施" : groups[k]});
  if(!d.meta_date)d.meta_date=getSelectedDate();
  return d;
}
function populateCard(card,d){
  card.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k; const v=d[k];
    if(el.type==="checkbox"){
      if(Array.isArray(v))el.checked=v.includes(el.value); else el.checked=!!v && (el.value==="実施" || String(v)===el.value);
    }else if(el.type==="radio")el.checked=String(v||"")===el.value;
    else el.value=v||"";
  });
}
function wireCard(card){
  card.addEventListener("input",()=>{collectCardData(card);saveAll(false);refreshMonthSummaryOnly(card);});
  card.addEventListener("change",()=>{collectCardData(card);saveAll(false);refreshMonthSummaryOnly(card);});
  const copy=card.querySelector(".copyOneBtn"); if(copy)copy.addEventListener("click",()=>{const d=collectCardData(card)||getRecordById(card.dataset.recordId);copyText(buildRecordText(d,true), monthlyScreen.classList.contains("active")?monthlyStatusEl:statusEl)});
  const del=card.querySelector(".deleteBtn"); if(del)del.addEventListener("click",()=>deleteRecord(card.dataset.recordId));
  const dup=card.querySelector(".duplicateBtn"); if(dup)dup.addEventListener("click",()=>duplicateRecord(card.dataset.recordId));
  const mon=card.querySelector(".openMonthlyBtn"); if(mon)mon.addEventListener("click",()=>{const d=getRecordById(card.dataset.recordId); if(d){openMonthlyForRecord(d)}});
  const toggle=card.querySelector(".toggleEditBtn"); if(toggle)toggle.addEventListener("click",()=>{const editor=card.querySelector(".month-editor"); editor.classList.toggle("hidden"); toggle.textContent=editor.classList.contains("hidden")?"編集":"閉じる";});
}
function refreshMonthSummaryOnly(card){
  if(!card.classList.contains("month-card"))return;
  const d=getRecordById(card.dataset.recordId);
  if(!d)return;
  const date=card.querySelector(".month-date");
  if(date)date.textContent=formatDateSlash(d.meta_date);
}
function deleteRecord(id){
  if(!confirm("この記録を削除しますか？"))return; records=records.filter(r=>r.__id!==id); saveAll(false); renderDaily(); renderMonthly(); showStatus("削除しました", monthlyScreen.classList.contains("active")?monthlyStatusEl:statusEl);
}
function duplicateRecord(id){const src=getRecordById(id); if(!src)return; const copy={...src,__id:uid()}; records.push(copy); saveAll(); renderDaily(); showStatus("複製しました")}

function renderDaily(){
  const date=getSelectedDate(); const list=records.filter(r=>(r.meta_date||date)===date);
  recordsEl.innerHTML=""; $("dailySummary").textContent=`${formatDateJP(date)}　訪問：${list.length}件`;
  if(!list.length){recordsEl.innerHTML=`<div class="empty-state">この日付の記録はありません。<br>利用者一覧から月別記録を開いて追加してください。</div>`;return}
  list.forEach(createDailyCard);
}
function renderUsers(){
  const keyword=String($("userSearch").value||"").trim().toLowerCase();
  const list=users.filter(u=>String(u.name||"").toLowerCase().includes(keyword));
  $("userCountBadge").textContent=users.length;
  userListEl.innerHTML="";
  if(!list.length){
    userListEl.innerHTML=`<div class="empty-state">利用者がありません。<br>「＋ 利用者を追加」から登録してください。</div>`;
    return;
  }
  list.forEach(user=>{
    const row=document.createElement("div");
    row.className="user-row";
    row.setAttribute("role","button");
    row.setAttribute("tabindex","0");
    row.setAttribute("aria-label",`${user.name||"未設定"}の月別記録を開く`);
    row.innerHTML=`<div class="user-initial" data-user-initial-id="${user.id}">${escapeHTML(userInitial(user.name))}</div><div class="user-name-static" data-user-name-id="${user.id}">${escapeHTML(user.name||"未設定")}</div><button type="button" class="trash-btn" aria-label="削除">🗑</button>`;

    const open=()=>openMonthlyForUser(user.id);
    row.addEventListener("click",e=>{
      if(e.target.closest(".trash-btn"))return;
      open();
    });
    row.addEventListener("keydown",e=>{
      if(e.key==="Enter" || e.key===" "){
        e.preventDefault();
        open();
      }
    });
    row.querySelector(".trash-btn").addEventListener("click",e=>{e.stopPropagation();deleteUser(user.id);});
    userListEl.appendChild(row);
  });
}
function renderMonthly(){
  const user=users.find(u=>u.id===currentUserId); if(!user){return}
  $("monthlyUserTitle").textContent=String(user.name||"未設定") || "利用者記録";
  const month=getSelectedMonth();
  const list=records.filter(r=>r.meta_user_ref===currentUserId && String(r.meta_date||"").slice(0,7)===month).sort((a,b)=>String(b.meta_date).localeCompare(String(a.meta_date)));
  $("monthlySummary").textContent=`${month.replace("-","年")}月　記録：${list.length}件`;
  monthlyRecordsEl.innerHTML="";
  if(!list.length){monthlyRecordsEl.innerHTML=`<div class="empty-state">この月の記録はありません。<br>「＋ 記録追加」から追加できます。</div>`;return}
  list.forEach(createMonthCard);
}

function openAddUserModal(){
  const input=$("addUserNameInput");
  input.value="";
  input.placeholder=`例：利用者${users.length+1}`;
  $("addUserModal").classList.remove("hidden");
  setTimeout(()=>input.focus(),0);
}
function closeAddUserModal(){
  $("addUserModal").classList.add("hidden");
  $("addUserNameInput").value="";
}
function confirmAddUser(){
  addUser($("addUserNameInput").value);
  closeAddUserModal();
}

function addLine(lines,label,value,omit=true){if(Array.isArray(value))value=value.join("／"); value=String(value||"").trim(); if(!value && omit)return; lines.push(`${label}：${value}`)}
function hasAny(vals){return vals.some(v=>Array.isArray(v)?v.length:String(v||"").trim())}
function section(lines,title,items,omit=true){const rows=items.filter(it=>Array.isArray(it.value)?it.value.length:String(it.value||"").trim()||!omit); if(!rows.length&&omit)return; lines.push("",`[${title}]`); rows.forEach(it=>addLine(lines,it.label,it.value,omit))}
function levelWithMemo(level,memo){level=String(level||"").trim(); memo=String(memo||"").trim(); return [level,memo].filter(Boolean).join("／")}
function interventionText(done,memo){const d=Array.isArray(done)?done.join("／"):String(done||""); memo=String(memo||"").trim(); return [d,memo].filter(Boolean).join("／")}

  section(lines,"基本動作",[{label:"起居",value:levelWithMemo(d.basic_bed_level,d.basic_bed_memo)},{label:"起立",value:levelWithMemo(d.basic_stand_level,d.basic_stand_memo)},{label:"移乗",value:levelWithMemo(d.basic_transfer_level,d.basic_transfer_memo)},{label:"屋内移動",value:levelWithMemo(safeArr(d.basic_indoor_methods).join("／"),d.basic_indoor_memo)},{label:"屋外移動",value:levelWithMemo(safeArr(d.basic_outdoor_methods).join("／"),d.basic_outdoor_memo)},{label:"跛行",value:d.basic_limp}],omit);

  section(lines,"介入内容",[{label:"ROM訓練",value:interventionText(d.int_rom_done,d.int_rom_memo)},{label:"筋力訓練",value:interventionText(d.int_strength_done,d.int_strength_memo)},{label:"バランス練習",value:interventionText(d.int_balance_done,d.int_balance_memo)},{label:"歩行練習",value:interventionText(d.int_gait_done,d.int_gait_memo)},{label:"基本動作練習",value:interventionText(d.int_basic_done,d.int_basic_memo)},{label:"ADL練習",value:interventionText(d.int_adl_done,d.int_adl_memo)},{label:"自主訓練指導",value:interventionText(d.int_self_done,d.int_self_memo)},{label:"環境調整",value:interventionText(d.int_environment_done,d.int_environment_memo)},{label:"家族指導",value:interventionText(d.int_family_done,d.int_family_memo)}],omit);
  section(lines,"特記事項",[{label:"転倒",value:d.special_fall},{label:"受診・服薬変更",value:d.special_medical_change},{label:"家族・ケアマネ連絡",value:d.special_contact},{label:"リスク・注意点",value:d.special_risk},{label:"次回方針",value:d.special_next_plan},{label:"その他",value:d.special_other}],omit);
  return lines.join("\n").replace(/\n{3,}/g,"\n\n").trim();

function buildMonthlyReportText(){const user=users.find(u=>u.id===currentUserId);const month=getSelectedMonth();const list=records.filter(r=>r.meta_user_ref===currentUserId&&String(r.meta_date||"").slice(0,7)===month).sort((a,b)=>String(a.meta_date).localeCompare(String(b.meta_date)));const lines=[`【月次報告書用データ】`,`対象：${user?.name||"未設定"}`,`対象月：${month}`,`記録件数：${list.length}`,""]; list.forEach((r,i)=>{lines.push(`--- ${formatDateSlash(r.meta_date)} ---`); lines.push(buildRecordText(r,true)); if(i<list.length-1)lines.push("")}); return lines.join("\n").replace(/\n{3,}/g,"\n\n").trim()}
function copyWithTextArea(text){
  const buf=document.createElement("textarea");
  buf.value=String(text||"");
  buf.readOnly=true;
  buf.style.position="fixed";
  buf.style.left="0";
  buf.style.top="0";
  buf.style.opacity="0";
  buf.style.width="1px";
  buf.style.height="1px";
  document.body.appendChild(buf);
  buf.focus({preventScroll:true});
  buf.select();
  buf.setSelectionRange(0,buf.value.length);
  const copied=document.execCommand("copy");
  buf.remove();
  return copied;
}
function copyWithContentEditable(text){
  const el=document.createElement("div");
  el.textContent=String(text||"");
  el.contentEditable="true";
  el.style.position="fixed";
  el.style.left="0";
  el.style.top="0";
  el.style.opacity="0";
  el.style.width="1px";
  el.style.height="1px";
  el.style.whiteSpace="pre-wrap";
  document.body.appendChild(el);
  const range=document.createRange();
  range.selectNodeContents(el);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  const copied=document.execCommand("copy");
  sel.removeAllRanges();
  el.remove();
  return copied;
}
function hideManualCopy(){
  const buf=$("copyBuffer");
  buf.value="";
  buf.readOnly=true;
  buf.style.position="absolute";
  buf.style.left="-9999px";
  buf.style.top="-9999px";
  buf.style.opacity=0;
  buf.style.width="";
  buf.style.height="";
}
function showManualCopy(text,target){
  const buf=$("copyBuffer");
  buf.value=String(text||"");
  buf.readOnly=false;
  buf.style.position="static";
  buf.style.opacity=1;
  buf.style.width="100%";
  buf.style.height="240px";
  buf.focus();
  buf.select();
  showStatus("自動コピーできませんでした。下のテキストを手動でコピーしてください。",target);
}
async function copyText(text,target=statusEl){
  const value=String(text||"");
  let copied=false;
  if(!copied){
    try{copied=copyWithTextArea(value)}catch(e){copied=false}
  }
  if(!copied){
    try{copied=copyWithContentEditable(value)}catch(e){copied=false}
  }
  if(!copied&&navigator.clipboard&&window.isSecureContext){
    try{await navigator.clipboard.writeText(value);copied=true}catch(e){copied=false}
  }
  if(copied){hideManualCopy();showStatus("クリップボードにコピーしました",target)}
  else showManualCopy(value,target);
}
function addMonthlyRecord(){const user=users.find(u=>u.id===currentUserId); if(!user)return; const month=getSelectedMonth(); let date=today(); if(date.slice(0,7)!==month)date=`${month}-01`; const rec=addRecordForUserOnDate(user.id,date); renderMonthly(); showStatus("記録を追加しました",monthlyStatusEl); setTimeout(()=>{const card=document.querySelector(`[data-record-id="${rec.__id}"]`); if(card){card.scrollIntoView({behavior:"smooth",block:"center"}); const editor=card.querySelector(".month-editor"); const btn=card.querySelector(".toggleEditBtn"); if(editor){editor.classList.remove("hidden"); if(btn)btn.textContent="閉じる"}}},0)}

function normalizeOldDate(v){
  const s=String(v||"").trim();
  if(!s)return today();
  const m=s.match(/(\d{4})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})/);
  if(m)return `${m[1]}-${String(Number(m[2])).padStart(2,"0")}-${String(Number(m[3])).padStart(2,"0")}`;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return today();
}
function parseOldVitals(v){
  const out={};
  String(v||"").split(/\r?\n/).forEach(line=>{
    const s=line.trim();
    let m=s.match(/^(SBP|収縮期血圧)\s*[：:]\s*(.+)$/i); if(m){out.vital_sbp=m[2].trim();return;}
    m=s.match(/^(DBP|拡張期血圧)\s*[：:]\s*(.+)$/i); if(m){out.vital_dbp=m[2].trim();return;}
    m=s.match(/^(SpO2|SPO2|SpO₂|酸素飽和度)\s*[：:]\s*(.+)$/i); if(m){out.vital_spo2=m[2].trim();return;}
    m=s.match(/^(PR|脈拍)\s*[：:]\s*(.+)$/i); if(m){out.vital_pr=m[2].trim();return;}
  });
  return out;
}
function oldUserNameFromObject(obj){
  if(!obj || typeof obj!=="object")return "";
  return String(obj.userName||obj.patientName||obj.patient||obj.name||obj.user||obj.memberName||obj.label||obj.title||"").trim();
}
function extractOldEntries(data,ctx={userName:""}){
  const entries=[];
  if(Array.isArray(data)){
    data.forEach(item=>entries.push(...extractOldEntries(item,ctx)));
    return entries;
  }
  if(!data || typeof data!=="object")return entries;
  const hasOldRecord = ("d" in data) || ("v" in data) || ("m" in data);
  if(hasOldRecord && (data.d || data.v || data.m)){
    entries.push({raw:data,userName:oldUserNameFromObject(data)||ctx.userName});
    return entries;
  }
  const nextCtx={...ctx};
  const name=oldUserNameFromObject(data);
  if(name)nextCtx.userName=name;
  Object.keys(data).forEach(k=>{
    if(k==="id")return;
    const value=data[k];
    if(value && (Array.isArray(value) || typeof value==="object"))entries.push(...extractOldEntries(value,nextCtx));
  });
  return entries;
}
function getOrCreateUserByName(name){
  const n=String(name||"").trim()||"旧データ";
  let user=users.find(u=>String(u.name||"").trim()===n);
  if(!user){user=makeUser(n);users.push(user)}
  return user;
}
function convertOldEntryToRecord(entry,fallbackName){
  const raw=entry.raw||{};
  const user=getOrCreateUserByName(entry.userName||fallbackName||"旧データ");
  const vitals=parseOldVitals(raw.v);
  return {
    __id:uid(),
    old_id:String(raw.id||""),
    meta_date:normalizeOldDate(raw.d),
    meta_user_ref:user.id,
    meta_user_id:user.name,
    ...vitals,
    overall_speech:String(raw.m||"").trim(),
    special_other:String(raw.note||raw.memo||"").trim()
  };
}
function importOldJsonData(data){
  const entries=extractOldEntries(data);
  if(!entries.length)throw new Error("旧JSONの記録が見つかりません");
  let fallbackName="旧データ";
  if(currentUserId){
    const u=users.find(x=>x.id===currentUserId);
    if(u?.name)fallbackName=u.name;
  }
  if(!entries.some(e=>e.userName)){
    const input=prompt("この旧JSONの取り込み先の利用者ID・表示名を入力してください", fallbackName);
    fallbackName=String(input||fallbackName).trim()||"旧データ";
  }
  const converted=entries.map(e=>convertOldEntryToRecord(e,fallbackName));
  records.push(...converted);
  const firstDate=converted[0]?.meta_date;
  if(firstDate){selectedDateEl.value=firstDate;selectedMonthEl.value=firstDate.slice(0,7)}
  saveUsers(false); saveAll(false); renderUsers(); renderDaily(); renderMonthly();
  return converted.length;
}
